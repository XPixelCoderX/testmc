<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheerpJ JAR Runner</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        #status {
            background: #2d2d2d;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
            font-size: 14px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .error { color: #f48771; }
        .success { color: #6a9955; }
        .info { color: #9cdcfe; }
        button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 3px;
            margin: 5px;
        }
        button:hover { background: #1177bb; }
        input { margin: 10px 0; }
        .warning {
            background: #514c1a;
            padding: 10px;
            border-left: 3px solid #e5b83c;
            margin: 10px 0;
        }
    </style>
    <script src="https://cjrtnc.leaningtech.com/4.2/loader.js"></script>
</head>
<body>
    <h2>📦 CheerpJ JAR Runner</h2>
    <div class="warning">
        <strong>⚠️ IMPORTANT:</strong> You MUST run this page through an HTTP server.<br>
        If you see "file://" in your address bar, this WILL NOT work.<br>
        → Open terminal in this folder and run: <code>python -m http.server 8080</code><br>
        → Then open: <code>http://localhost:8080</code>
    </div>
    
    <div>
        <label>Select your JAR file:</label>
        <input type="file" id="jarFile" accept=".jar">
        <button id="runBtn" disabled>▶ Run JAR</button>
        <button id="clearBtn">🗑 Clear</button>
    </div>
    
    <div id="status">Status: Waiting for JAR file...</div>
    
    <div id="display"></div>

    <script>
        // DOM elements
        const jarInput = document.getElementById('jarFile');
        const runBtn = document.getElementById('runBtn');
        const clearBtn = document.getElementById('clearBtn');
        const statusDiv = document.getElementById('status');
        const displayDiv = document.getElementById('display');
        
        let currentJarData = null;
        let currentJarName = null;
        let initialized = false;
        
        function log(message, type = 'info') {
            statusDiv.innerHTML = `<span class="${type}">${new Date().toLocaleTimeString()}: ${message}</span><br>${statusDiv.innerHTML}`;
            console.log(message);
        }
        
        // Initialize CheerpJ (call once)
        async function initCheerpJ() {
            if (initialized) return true;
            
            log("Initializing CheerpJ 4.2...", 'info');
            try {
                // Use Java 11 for maximum compatibility with most JARs
                // enableDebug helps with troubleshooting
                await cheerpjInit({ 
                    version: 11, 
                    enableDebug: true,
                    status: "default"
                });
                initialized = true;
                log("✅ CheerpJ initialized successfully!", 'success');
                return true;
            } catch (e) {
                log(`❌ CheerpJ init failed: ${e.message}`, 'error');
                return false;
            }
        }
        
        // Write JAR file to CheerpJ virtual filesystem
        async function writeJarToVFS(jarData, filename) {
            return new Promise((resolve, reject) => {
                try {
                    // Convert ArrayBuffer to Uint8Array
                    const uint8Array = new Uint8Array(jarData);
                    
                    // Convert to Base64 (CheerpJ expects this format for /str/ mount)
                    let binary = '';
                    for (let i = 0; i < uint8Array.length; i++) {
                        binary += String.fromCharCode(uint8Array[i]);
                    }
                    const base64 = btoa(binary);
                    
                    // Use /str/ mount - temporary storage for uploaded files
                    const vfsPath = `/str/${filename}`;
                    
                    // Check if cheerpOSAddStringFile exists
                    if (typeof cheerpOSAddStringFile !== 'undefined') {
                        cheerpOSAddStringFile(vfsPath, base64);
                        log(`✅ File written to VFS: ${vfsPath}`, 'success');
                        resolve(vfsPath);
                    } else {
                        reject(new Error("cheerpOSAddStringFile not found - CheerpJ not loaded"));
                    }
                } catch (e) {
                    reject(e);
                }
            });
        }
        
        // Method 1: Try cheerpjRunJar (for JARs with Main-Class manifest)
        async function runWithRunJar(jarPath) {
            log("Trying cheerpjRunJar...", 'info');
            try {
                const exitCode = await cheerpjRunJar(jarPath);
                log(`cheerpjRunJar exit code: ${exitCode}`, exitCode === 0 ? 'success' : 'error');
                return exitCode === 0;
            } catch (e) {
                log(`cheerpjRunJar failed: ${e.message}`, 'error');
                return false;
            }
        }
        
        // Method 2: Try cheerpjRunMain (for JARs without Main-Class manifest)
        async function runWithRunMain(jarPath) {
            log("Trying cheerpjRunMain with automatic main class detection...", 'info');
            try {
                // Try common main class patterns
                const mainClasses = [
                    "Main",
                    "main",
                    "Start",
                    "Application",
                    "Launcher",
                    "com.company.Main"
                ];
                
                for (const mainClass of mainClasses) {
                    try {
                        log(`Attempting main class: ${mainClass}`, 'info');
                        const exitCode = await cheerpjRunMain(mainClass, jarPath);
                        if (exitCode === 0) {
                            log(`✅ Success with main class: ${mainClass}`, 'success');
                            return true;
                        }
                    } catch (e) {
                        // Continue to next main class
                    }
                }
                
                log("No main class found. Your JAR may need a specific main class name.", 'error');
                return false;
            } catch (e) {
                log(`cheerpjRunMain failed: ${e.message}`, 'error');
                return false;
            }
        }
        
        // Run the JAR file
        async function runJar(jarPath, filename) {
            // Clear previous display
            displayDiv.innerHTML = '';
            
            // Create display canvas
            log("Creating display canvas...", 'info');
            const canvas = cheerpjCreateDisplay(800, 600);
            if (canvas) {
                displayDiv.appendChild(canvas);
            }
            
            // Try both methods
            let success = await runWithRunJar(jarPath);
            if (!success) {
                log("cheerpjRunJar failed, trying cheerpjRunMain...", 'info');
                success = await runWithRunMain(jarPath);
            }
            
            if (success) {
                log(`✅ ${filename} is running!`, 'success');
            } else {
                log(`❌ Failed to run ${filename}. The JAR may:`, 'error');
                log(`   - Not have a Main-Class in manifest`, 'error');
                log(`   - Use Java features not supported by CheerpJ`, 'error');
                log(`   - Require native libraries (JNI)`, 'error');
                displayDiv.innerHTML = '<div class="warning" style="margin-top:20px">Failed to run. Check status messages above.</div>';
            }
            
            return success;
        }
        
        // Handle file upload
        async function handleJarFile(file) {
            if (!file || !file.name.endsWith('.jar')) {
                log("Please select a valid .jar file", 'error');
                return false;
            }
            
            log(`Loading ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)...`, 'info');
            
            try {
                // Read file
                const jarData = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.onerror = (e) => reject(e.target.error);
                    reader.readAsArrayBuffer(file);
                });
                
                currentJarData = jarData;
                currentJarName = file.name;
                
                // Initialize CheerpJ
                const initSuccess = await initCheerpJ();
                if (!initSuccess) return false;
                
                // Write to VFS
                const jarPath = await writeJarToVFS(jarData, file.name);
                
                // Enable run button
                runBtn.disabled = false;
                
                // Store for run button
                window.currentJarPath = jarPath;
                window.currentJarName = file.name;
                
                log(`✅ Ready to run: ${jarPath}`, 'success');
                return true;
                
            } catch (e) {
                log(`❌ Error: ${e.message}`, 'error');
                return false;
            }
        }
        
        // Clear everything
        function clearAll() {
            currentJarData = null;
            currentJarName = null;
            window.currentJarPath = null;
            displayDiv.innerHTML = '';
            runBtn.disabled = true;
            jarInput.value = '';
            log("Cleared. Upload a new JAR file.", 'info');
        }
        
        // Play button handler
        async function playGame() {
            if (!window.currentJarPath) {
                log("No JAR loaded. Please upload a JAR first.", 'error');
                return;
            }
            
            runBtn.disabled = true;
            await runJar(window.currentJarPath, window.currentJarName);
            runBtn.disabled = false;
        }
        
        // Event listeners
        jarInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) await handleJarFile(file);
        });
        
        runBtn.addEventListener('click', playGame);
        clearBtn.addEventListener('click', clearAll);
        
        // Check if running via HTTP server
        if (window.location.protocol === 'file:') {
            log("❌ ERROR: You opened this page by double-clicking!", 'error');
            log("   CheerpJ REQUIRES an HTTP server. Follow the instructions at the top.", 'error');
        } else {
            log("✅ Running via HTTP server. Ready for JAR upload.", 'success');
        }
    </script>
</body>
</html>
